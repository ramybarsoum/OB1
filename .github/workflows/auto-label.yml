name: Auto-Label PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect contribution types and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const labels = new Set();
            const pathMap = {
              'recipes/': 'recipe',
              'schemas/': 'schema',
              'dashboards/': 'dashboard',
              'integrations/': 'integration',
            };

            for (const file of files) {
              for (const [prefix, label] of Object.entries(pathMap)) {
                if (file.filename.startsWith(prefix) && !file.filename.includes('_template/')) {
                  labels.add(label);
                }
              }
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labels],
              });
              console.log(`Applied labels: ${[...labels].join(', ')}`);
            } else {
              console.log('No contribution directories detected, no labels applied.');
            }
